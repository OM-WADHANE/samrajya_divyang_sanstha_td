<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>साम्राज्य दिव्यांग संस्था | Samrajya Divyang Sanstha</title>
<meta name="description" content="साम्राज्य दिव्यांग संस्था - दिव्यांग व्यक्तींच्या सक्षमीकरणासाठी कार्यरत एक समर्पित संस्था."/>
<meta name="keywords" content="Samrajya Divyang Sanstha, दिव्यांग, disability, Talegaon, Pune, welfare, NGO"/>
<meta property="og:title" content="साम्राज्य दिव्यांग संस्था | Samrajya Divyang Sanstha"/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   RESET & BASE
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ============================================================
   CSS VARIABLES — LIGHT MODE
============================================================ */
:root{
  --purple:#6A1B9A;
  --purple-dark:#4A148C;
  --purple-mid:#7B1FA2;
  --purple-light:#AB47BC;
  --purple-pale:#F3E5F5;
  --purple-pale2:#E1BEE7;
  --orange:#E65100;
  --orange-mid:#F4511E;
  --orange-light:#FF7043;
  --orange-pale:#FBE9E7;
  --orange-gold:#FF8F00;
  --navy:#1A0533;
  --navy2:#2D0A52;
  --cream:#FFFFFF;
  --surface:#FAFAFA;
  --border:rgba(106,27,154,0.15);
  --white:#FFFFFF;
  --text-dark:#1A0533;
  --text-mid:#4A3560;
  --text-light:#8E7AAE;
  --shadow:0 4px 24px rgba(106,27,154,0.13);
  --shadow-card:0 2px 16px rgba(106,27,154,0.10);
  --nav-h:68px;
}

/* ============================================================
   DARK MODE
============================================================ */
body.dark{
  --cream:#0F0518;
  --surface:#1A0B2E;
  --border:rgba(171,71,188,0.22);
  --white:#1A0B2E;
  --text-dark:#EDE7F6;
  --text-mid:#C5B3E0;
  --text-light:#9E86C2;
  --shadow:0 4px 24px rgba(106,27,154,0.35);
  --shadow-card:0 2px 16px rgba(0,0,0,0.4);
  --purple-pale:rgba(106,27,154,0.25);
  --purple-pale2:rgba(106,27,154,0.35);
  --orange-pale:rgba(230,81,0,0.18);
}

/* ============================================================
   GLOBAL
============================================================ */
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);transition:background .35s,color .35s}
.mr{font-family:'Tiro Devanagari Marathi',sans-serif}

/* ============================================================
   NAVBAR
============================================================ */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--navy);
  border-bottom:3px solid var(--orange-mid);
  padding:0 1.8rem;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  transition:transform .32s cubic-bezier(.4,0,.2,1),box-shadow .32s;
  box-shadow:0 2px 24px rgba(26,5,51,.55);
  overflow:hidden;
}
#navbar.hidden{transform:translateY(-100%)}
#navbar.visible{transform:translateY(0)}
#navbar::before{
  content:'';position:absolute;width:90px;height:90px;
  border:2px solid rgba(255,255,255,.06);border-radius:50%;
  top:-30px;left:-20px;pointer-events:none;
}
#navbar::after{
  content:'';position:absolute;width:60px;height:60px;
  border:2px solid rgba(244,81,30,.15);border-radius:50%;
  bottom:-25px;right:80px;pointer-events:none;
}

/* Brand */
.nav-brand{display:flex;align-items:center;gap:13px;flex-shrink:0}
.nav-logo-wrap{flex-shrink:0;animation:slideFromRight .75s cubic-bezier(.22,1,.36,1) both}
.nav-logo-img{
  width:48px;height:48px;border-radius:50%;object-fit:cover;
  border:2.5px solid var(--orange-mid);background:white;display:block;
  box-shadow:0 0 0 3px rgba(244,81,30,.22);
}
.nav-text-wrap{animation:slideFromLeft .75s cubic-bezier(.22,1,.36,1) .1s both}
.nav-name{font-size:16px;font-weight:700;color:white;font-family:'Tiro Devanagari Marathi',sans-serif;line-height:1.2}
.nav-name-en{font-size:10px;color:rgba(255,255,255,.40);font-family:'DM Sans',sans-serif}

@keyframes slideFromRight{from{transform:translateX(70px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideFromLeft{from{transform:translateX(-70px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Nav links */
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{
  color:rgba(255,255,255,.72);font-size:13px;font-weight:500;
  padding:5px 12px;border-radius:6px;cursor:pointer;
  border:none;background:none;transition:all .18s;font-family:'DM Sans',sans-serif;
}
.nav-link:hover,.nav-link.active{color:white;background:rgba(244,81,30,.22)}

/* Lang toggle */
.lang-toggle{
  display:flex;background:rgba(255,255,255,.08);
  border-radius:7px;overflow:hidden;
  border:1px solid rgba(255,255,255,.16);margin-left:8px;
}
.lang-btn{
  padding:4px 11px;font-size:12px;font-weight:600;
  cursor:pointer;border:none;transition:all .18s;
  color:rgba(255,255,255,.55);background:transparent;font-family:'DM Sans',sans-serif;
}
.lang-btn.act{background:var(--orange);color:white}

/* Dark toggle */
.dark-toggle{
  margin-left:10px;width:46px;height:24px;
  background:rgba(255,255,255,.12);border-radius:100px;
  border:1px solid rgba(255,255,255,.2);
  cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;
}
.dark-toggle-knob{
  position:absolute;top:2px;left:2px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;line-height:1;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);user-select:none;
}
body.dark .dark-toggle{background:rgba(171,71,188,.4);border-color:rgba(171,71,188,.5)}
body.dark .dark-toggle-knob{transform:translateX(22px)}

/* Nav right */
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.desktop-only{display:flex}
.mobile-only{display:none}

/* Hamburger */
.hamburger{
  width:36px;height:36px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);border-radius:7px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  padding:6px;transition:background .2s;
}
.hamburger:hover{background:rgba(255,255,255,.18)}
.hamburger span{
  display:block;width:18px;height:2px;background:white;border-radius:2px;
  transition:transform .3s,opacity .3s;transform-origin:center;
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* Mobile dropdown */
.mobile-menu{
  position:fixed;top:var(--nav-h);left:0;right:0;
  background:var(--navy2);border-bottom:2px solid var(--orange-mid);
  z-index:999;display:flex;flex-direction:column;
  transform:translateY(-110%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.mobile-menu.open{transform:translateY(0)}
.mobile-nav-link{
  padding:14px 20px;color:rgba(255,255,255,.85);
  font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;
  background:none;border:none;border-bottom:1px solid rgba(255,255,255,.07);
  text-align:left;cursor:pointer;transition:all .18s;
}
.mobile-nav-link:hover{background:rgba(244,81,30,.15);color:white;padding-left:26px}
.mobile-nav-link:last-child{border-bottom:none}

/* ============================================================
   LEADERSHIP BANNER
============================================================ */
.lbanner{
  margin-top:var(--nav-h);
  background:linear-gradient(135deg,var(--navy2) 0%,var(--purple-mid) 100%);
  padding:9px 1.5rem;
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:5px 18px;border-bottom:2px solid var(--orange-mid);
}
.lb-title{
  font-size:10px;font-weight:700;color:var(--orange-light);
  text-transform:uppercase;letter-spacing:1.5px;
  border-right:1px solid rgba(255,255,255,.18);padding-right:14px;
  font-family:'DM Sans',sans-serif;
}
.lb-item{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,.9)}
.lb-role{
  font-size:9px;font-weight:700;background:var(--orange);color:white;
  padding:2px 7px;border-radius:4px;font-family:'DM Sans',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;
  border:1px solid rgba(255,111,0,.5);
}

/* ============================================================
   HERO
============================================================ */
.hero{
  padding:3.5rem 1.5rem 3rem;background:var(--cream);
  text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--purple-dark),var(--orange-mid),var(--orange-gold));
}
.hero-corners{position:absolute;inset:0;pointer-events:none}
.hero-corners::before{
  content:'';position:absolute;top:20px;right:20px;
  width:120px;height:120px;
  border-top:2px solid var(--border);border-right:2px solid var(--border);
  border-radius:0 14px 0 0;
}
.hero-corners::after{
  content:'';position:absolute;bottom:20px;left:20px;
  width:120px;height:120px;
  border-bottom:2px solid var(--border);border-left:2px solid var(--border);
  border-radius:0 0 0 14px;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 15% 50%,rgba(106,27,154,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 85% 30%,rgba(244,81,30,.05) 0%,transparent 60%);
}
.hero-inner{
  position:relative;z-index:1;max-width:720px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;
}
.hero-logo{
  width:116px;height:116px;border-radius:50%;object-fit:cover;
  border:4px solid var(--purple-pale2);
  box-shadow:0 0 0 7px rgba(106,27,154,.09),0 8px 36px rgba(106,27,154,.22);
  margin-bottom:1.4rem;background:white;
  animation:heroLogoIn .85s cubic-bezier(.22,1,.36,1) both;
}
@keyframes heroLogoIn{from{transform:scale(.5) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--orange-pale);border:1px solid rgba(230,81,0,.25);
  padding:5px 16px;border-radius:100px;
  font-size:11px;font-weight:700;color:var(--orange);
  margin-bottom:1rem;letter-spacing:.5px;font-family:'DM Sans',sans-serif;text-transform:uppercase;
}
.hero-title{
  font-family:'Tiro Devanagari Marathi',sans-serif;
  font-size:clamp(2rem,5vw,3.1rem);
  font-weight:400;line-height:1.2;color:var(--navy);margin-bottom:.3rem;
}
body.dark .hero-title{color:var(--text-dark)}
.hero-sub{font-size:14px;color:var(--text-light);margin-bottom:1rem;font-family:'DM Sans',sans-serif}
.hero-desc{
  font-size:15px;color:var(--text-mid);line-height:1.8;
  max-width:540px;margin:0 auto 1.75rem;
  font-family:'Tiro Devanagari Marathi',sans-serif;
}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-p{
  background:var(--orange);color:white;padding:11px 26px;border-radius:8px;
  font-size:14px;font-weight:600;border:2px solid var(--orange);
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.btn-p:hover{background:var(--orange-mid);transform:translateY(-2px);box-shadow:0 4px 16px rgba(230,81,0,.3)}
.btn-o{
  background:transparent;color:var(--purple);padding:11px 26px;border-radius:8px;
  font-size:14px;font-weight:600;border:2px solid var(--purple);
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.btn-o:hover{background:var(--purple-pale);transform:translateY(-2px)}
.hero-stats{
  display:flex;gap:2.5rem;justify-content:center;flex-wrap:wrap;
  margin-top:2.25rem;padding-top:1.75rem;border-top:1px solid var(--border);
}
.stat .num{font-size:2rem;font-weight:700;color:var(--purple);line-height:1}
.stat .lbl{font-size:11px;color:var(--text-light);margin-top:3px;font-weight:500}

/* ============================================================
   SECTIONS
============================================================ */
.sec{padding:2.75rem 1.5rem;max-width:980px;margin:0 auto}
.sec-bg-navy{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:2.75rem 1.5rem;position:relative;overflow:hidden;
}
.sec-bg-navy::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border:2px solid rgba(255,255,255,.05);
  border-radius:50%;pointer-events:none;
}
.sec-bg-orange{
  background:linear-gradient(135deg,var(--purple-pale) 0%,#fff3e0 100%);
  padding:2.75rem 1.5rem;position:relative;overflow:hidden;
}
body.dark .sec-bg-orange{
  background:linear-gradient(135deg,rgba(106,27,154,.18) 0%,rgba(230,81,0,.10) 100%);
}
.sec-bg-orange::before{
  content:'';position:absolute;top:16px;right:16px;width:80px;height:80px;
  border-top:2px solid var(--border);border-right:2px solid var(--border);
  border-radius:0 10px 0 0;pointer-events:none;
}
.sec-bg-orange::after{
  content:'';position:absolute;bottom:16px;left:16px;width:80px;height:80px;
  border-bottom:2px solid var(--border);border-left:2px solid var(--border);
  border-radius:0 0 0 10px;pointer-events:none;
}
.sec-inner{max-width:980px;margin:0 auto;position:relative;z-index:1}
.sec-tag{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--orange);text-transform:uppercase;margin-bottom:5px;font-family:'DM Sans',sans-serif;
}
.sec-tag-lt{color:var(--orange-light)}
.sec-title{
  font-family:'Tiro Devanagari Marathi',sans-serif;
  font-size:clamp(1.5rem,3vw,2.1rem);
  color:var(--text-dark);font-weight:400;margin-bottom:7px;line-height:1.3;
}
.sec-title-lt{color:white}
.sec-desc{font-size:14px;color:var(--text-mid);line-height:1.75;max-width:560px;font-family:'Tiro Devanagari Marathi',sans-serif}
.sec-desc-lt{color:rgba(255,255,255,.6)}
.divider{
  width:52px;height:3px;
  background:linear-gradient(90deg,var(--purple),var(--orange));
  border-radius:2px;margin:7px 0 16px;
}
.divider-lt{background:linear-gradient(90deg,var(--orange-light),var(--orange-gold))}

/* ============================================================
   ABOUT
============================================================ */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;margin-top:1.75rem}
.about-text p{font-size:14px;color:var(--text-mid);line-height:1.85;font-family:'Tiro Devanagari Marathi',sans-serif;margin-bottom:1rem}
.about-panel{
  background:linear-gradient(145deg,var(--navy) 0%,var(--purple-dark) 100%);
  border-radius:16px;padding:1.85rem;color:white;
  border-top:3px solid var(--orange);
  box-shadow:0 8px 32px rgba(106,27,154,.3);
  position:relative;overflow:hidden;
}
.about-panel::after{
  content:'';position:absolute;bottom:-30px;right:-30px;
  width:120px;height:120px;border:2px solid rgba(255,255,255,.06);
  border-radius:50%;pointer-events:none;
}
.av-item{
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:1rem;padding-bottom:1rem;
  border-bottom:1px solid rgba(255,255,255,.1);position:relative;z-index:1;
}
.av-item:last-child{border:none;margin:0;padding:0}
.av-icon{
  width:36px;height:36px;border-radius:8px;
  background:rgba(244,81,30,.2);border:1px solid rgba(244,81,30,.4);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.av-h{font-size:13px;font-weight:600;margin-bottom:2px;font-family:'Tiro Devanagari Marathi',sans-serif}
.av-p{font-size:12px;opacity:.65;font-family:'Tiro Devanagari Marathi',sans-serif;line-height:1.5}

/* ============================================================
   SERVICES
============================================================ */
.srv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:1.75rem}
.srv-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:1.35rem;transition:all .25s;position:relative;overflow:hidden;
}
.srv-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--purple-light),var(--orange));
  transform:scaleX(0);transform-origin:left;transition:transform .3s;
}
.srv-card:hover{background:rgba(255,255,255,.09);border-color:rgba(244,81,30,.4);transform:translateY(-3px)}
.srv-card:hover::before{transform:scaleX(1)}
.srv-icon{
  width:40px;height:40px;border-radius:9px;
  background:rgba(244,81,30,.15);border:1px solid rgba(244,81,30,.35);
  display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:11px;
}
.srv-t{font-size:14px;font-weight:600;color:white;margin-bottom:4px;font-family:'Tiro Devanagari Marathi',sans-serif}
.srv-d{font-size:12px;color:rgba(255,255,255,.55);line-height:1.55;font-family:'Tiro Devanagari Marathi',sans-serif}

/* ============================================================
   DOCUMENTS
============================================================ */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:1.75rem}
.doc-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:1.4rem;
  display:flex;flex-direction:column;gap:10px;
  transition:all .22s;position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
}
.doc-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--purple),var(--orange));
}
.doc-card:hover{box-shadow:0 6px 28px rgba(106,27,154,.18);transform:translateY(-3px)}
.doc-icon{font-size:26px}
.doc-t{font-size:15px;font-weight:600;color:var(--text-dark);line-height:1.3;font-family:'Tiro Devanagari Marathi',sans-serif}
.doc-s{font-size:11px;color:var(--text-light);font-family:'DM Sans',sans-serif}
.doc-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--orange);color:white;
  padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:all .18s;
  text-decoration:none;font-family:'DM Sans',sans-serif;
  width:fit-content;margin-top:auto;
}
.doc-btn:hover{background:var(--orange-mid);transform:translateY(-1px)}

/* ============================================================
   CONTACT
============================================================ */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;margin-top:1.75rem}
.contact-cards{display:flex;flex-direction:column;gap:10px}
.cc{
  background:var(--white);border:1px solid var(--border);
  border-radius:10px;padding:1rem 1.25rem;
  display:flex;align-items:flex-start;gap:10px;
  box-shadow:var(--shadow-card);transition:all .18s;
}
.cc:hover{box-shadow:0 4px 20px rgba(106,27,154,.14)}
.cc-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--orange-pale);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.cc-lbl{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Sans',sans-serif}
.cc-val{font-size:13px;color:var(--text-dark);margin-top:2px;line-height:1.55;font-family:'Tiro Devanagari Marathi',sans-serif}
.cc-val a{color:var(--purple);text-decoration:none}
.cc-val a:hover{text-decoration:underline}
.cc-val .reg{font-family:'DM Sans',sans-serif;font-weight:700;color:var(--purple-dark)}
.cform{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:1.6rem;
  box-shadow:var(--shadow);border-top:3px solid var(--orange);
}
.cform-t{font-size:16px;font-weight:600;color:var(--text-dark);margin-bottom:1rem;font-family:'Tiro Devanagari Marathi',sans-serif}
.fg{margin-bottom:12px}
.flbl{font-size:11px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px;font-family:'DM Sans',sans-serif}
.finp,.ftxt{
  width:100%;padding:9px 12px;border-radius:7px;
  border:1px solid var(--border);font-size:13px;
  font-family:'DM Sans',sans-serif;background:var(--surface);
  color:var(--text-dark);transition:border-color .18s;outline:none;
}
.finp:focus,.ftxt:focus{border-color:var(--orange);background:var(--white)}
.ftxt{min-height:85px;resize:vertical}
.fsub{
  background:var(--orange);color:white;padding:10px 20px;
  border-radius:7px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;width:100%;
}
.fsub:hover{background:var(--orange-mid)}
.form-msg{font-size:12px;margin-top:8px;display:none;color:var(--orange);font-family:'DM Sans',sans-serif}

/* ============================================================
   FOOTER
============================================================ */
footer{
  background:var(--navy);border-top:4px solid var(--orange);
  padding:2rem 1.5rem 1.25rem;position:relative;overflow:hidden;
}
footer::before{
  content:'';position:absolute;bottom:-50px;left:-50px;
  width:200px;height:200px;border:2px solid rgba(255,255,255,.04);
  border-radius:50%;pointer-events:none;
}
.foot-inner{
  max-width:980px;margin:0 auto;
  display:grid;grid-template-columns:1.5fr 1fr;
  gap:2rem;align-items:start;position:relative;z-index:1;
}
.foot-brand h3{font-size:16px;font-weight:700;color:white;font-family:'Tiro Devanagari Marathi',sans-serif}
.foot-brand p{font-size:12px;color:rgba(255,255,255,.38);margin-top:5px;line-height:1.7;font-family:'DM Sans',sans-serif}
.foot-links h4{font-size:11px;font-weight:700;color:var(--orange-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;font-family:'DM Sans',sans-serif}
.foot-links ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.foot-links li{font-size:13px;color:rgba(255,255,255,.48);cursor:pointer;transition:color .18s}
.foot-links li:hover{color:var(--orange-light)}
.foot-bottom{
  max-width:980px;margin:1.5rem auto 0;padding-top:1rem;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:6px;position:relative;z-index:1;
}
.foot-copy{font-size:11px;color:rgba(255,255,255,.28);font-family:'DM Sans',sans-serif}
.foot-dev{font-size:11px;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.38)}
.foot-dev a{color:var(--orange-light);font-weight:600;text-decoration:none}
.foot-dev a:hover{text-decoration:underline}
.foot-logo{
  width:56px;height:56px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(244,81,30,.5);margin-bottom:10px;background:white;
}

/* ============================================================
   SCROLL TARGET
============================================================ */
.st{scroll-margin-top:76px}

/* ============================================================
   RESPONSIVE — TABLET (≤900px)
============================================================ */
@media(max-width:900px){
  .about-grid{grid-template-columns:1fr}
  .about-panel{order:-1}
  .contact-grid{grid-template-columns:1fr}
  .foot-inner{grid-template-columns:1fr;gap:1.5rem}
  .srv-grid{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤640px)
============================================================ */
@media(max-width:640px){
  :root{--nav-h:60px}
  #navbar{padding:0 14px}
  .desktop-only{display:none !important}
  .mobile-only{display:flex !important}
  .nav-name{font-size:13px}
  .nav-name-en{font-size:9px}
  .nav-logo-img{width:38px;height:38px}
  .lbanner{flex-direction:column;text-align:center;gap:8px;padding:10px 1rem}
  .lb-title{
    border-right:none;padding-right:0;
    border-bottom:1px solid rgba(255,255,255,.12);
    padding-bottom:7px;width:100%;text-align:center;
  }
  .lb-item{justify-content:center;font-size:12px}
  .hero{padding:2rem 1rem}
  .hero-logo{width:90px;height:90px;margin-bottom:1rem}
  .hero-title{font-size:1.75rem}
  .hero-desc{font-size:13px}
  .hero-btns{flex-direction:column;align-items:center}
  .btn-p,.btn-o{width:100%;max-width:280px;text-align:center;padding:12px}
  .hero-stats{gap:1.5rem;margin-top:1.5rem;padding-top:1.25rem}
  .stat .num{font-size:1.5rem}
  .hero-corners::before,.hero-corners::after{display:none}
  .sec{padding:2rem 1rem}
  .sec-bg-navy,.sec-bg-orange{padding:2rem 1rem}
  .sec-title{font-size:1.35rem}
  .about-grid{grid-template-columns:1fr;gap:1.5rem}
  .about-panel{padding:1.25rem}
  .srv-grid{grid-template-columns:1fr 1fr;gap:10px}
  .srv-t{font-size:13px}
  .srv-d{font-size:11px}
  .doc-grid{grid-template-columns:1fr;gap:12px}
  .contact-grid{grid-template-columns:1fr;gap:1.5rem}
  .cform{padding:1.25rem}
  .foot-inner{grid-template-columns:1fr;gap:1.5rem}
  .foot-bottom{flex-direction:column;text-align:center;gap:8px}
  .foot-copy,.foot-dev{font-size:10px}
  .mobile-menu{top:var(--nav-h)}
  .st{scroll-margin-top:66px}
}

/* ============================================================
   RESPONSIVE — SMALL MOBILE (≤380px)
============================================================ */
@media(max-width:380px){
  .nav-name{font-size:12px}
  .nav-brand{gap:8px}
  .nav-logo-img{width:34px;height:34px}
  .hero-title{font-size:1.5rem}
  .srv-grid{grid-template-columns:1fr}
  .lang-btn{padding:4px 8px;font-size:11px}
}
</style>

// ============================================================
// DARK MODE
// ============================================================
function toggleDark(){
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  localStorage.setItem('sds-dark', darkMode ? '1' : '0');
  // update knob emoji without full re-render
  document.querySelectorAll('.dark-toggle-knob').forEach(k => {
    k.textContent = darkMode ? '🌙' : '☀️';
  });
}
function initDarkMode(){
  if(localStorage.getItem('sds-dark') === '1'){
    darkMode = true;
    document.body.classList.add('dark');
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function go(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth'});
  closeMobileMenu();
}
function setL(l){ lang = l; render(); }

// ============================================================
// MOBILE MENU
// ============================================================
function toggleMenu(){
  const menu = document.getElementById('mobile-menu');
  const btn  = document.getElementById('hamburger');
  if(!menu) return;
  const open = menu.classList.toggle('open');
  if(btn) btn.classList.toggle('open', open);
}
function closeMobileMenu(){
  const menu = document.getElementById('mobile-menu');
  const btn  = document.getElementById('hamburger');
  if(menu) menu.classList.remove('open');
  if(btn)  btn.classList.remove('open');
}

// ============================================================
// SCROLL HIDE/SHOW NAVBAR
// ============================================================
function initScroll(){
  let lastY = window.scrollY;
  window.onscroll = () => {
    const nav = document.getElementById('navbar');
    if(!nav) return;
    const y = window.scrollY;
    if(y > lastY && y > 90){
      nav.classList.add('hidden'); nav.classList.remove('visible');
    } else {
      nav.classList.remove('hidden'); nav.classList.add('visible');
    }
    lastY = y;
  };
}

function sendMail(){
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();
  const l = T[lang];
  if(!name || !msg){
    alert(lang==='mr' ? 'कृपया नाव आणि संदेश भरा.' : 'Please fill your name and message.');
    return;
  }
  const sub  = encodeURIComponent((lang==='mr' ? 'संस्थेकडून संदेश: ' : 'Message from website: ') + name);
  const body = encodeURIComponent(
    (lang==='mr'?'नाव: ':'Name: ')+name+'\n'+
    (lang==='mr'?'ईमेल: ':'Email: ')+email+'\n\n'+
    (lang==='mr'?'संदेश:\n':'Message:\n')+msg
  );
  window.open('mailto:samrajyawelfare@gmail.com?subject='+sub+'&body='+body,'_blank');
  const fm = document.getElementById('form-msg');
  fm.style.display = 'block';
  fm.textContent = l.contact.sent;
  setTimeout(()=>{ fm.style.display='none'; }, 4000);
}
