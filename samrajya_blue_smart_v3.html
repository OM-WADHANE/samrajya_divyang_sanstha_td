.lang-btn{

  color:rgba(255,255,255,0.55);background:transparent;font-family:'DM Sans',sans-serif;
}

/* LEADERSHIP BANNER */
.lbanner{
  margin-top:62px;

}
.lb-title{
  font-size:10px;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:1.5px;
  border-right:1px solid rgba(255,255,255,0.18);
  padding-right:14px;font-family:'DM Sans',sans-serif;
}
.lb-item{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.9)}
.lb-role{

  text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;
  border:1px solid rgba(41,182,246,0.4);
}

.hero{

}
.hero::before{

}
.hero-bg{
  position:absolute;inset:0;
  background:

}
.hero-inner{position:relative;z-index:1;max-width:700px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
.hero-logo{
  width:100px;height:100px;border-radius:50%;
  object-fit:cover;border:4px solid var(--blue-pale2);
  box-shadow:0 0 0 6px rgba(21,101,192,0.08);
  margin-bottom:1.25rem;background:white;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-pale);border:1px solid rgba(21,101,192,0.2);
  padding:5px 14px;border-radius:100px;
  font-size:11px;font-weight:700;color:var(--blue);
  margin-bottom:1rem;letter-spacing:0.5px;font-family:'DM Sans',sans-serif;text-transform:uppercase;
}
.hero-title{
  font-family:'Tiro Devanagari Marathi',sans-serif;
  font-size:clamp(1.8rem,4.5vw,2.8rem);
  font-weight:400;line-height:1.2;color:var(--navy);margin-bottom:0.3rem;
}
.hero-sub{font-size:14px;color:var(--text-light);margin-bottom:1rem;font-family:'DM Sans',sans-serif}
.hero-desc{
  font-size:14px;color:var(--text-mid);line-height:1.75;
  max-width:520px;margin:0 auto 1.5rem;
  font-family:'Tiro Devanagari Marathi',sans-serif;
}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-p{
  background:var(--blue);color:white;padding:10px 24px;border-radius:7px;
  font-size:13px;font-weight:600;border:2px solid var(--blue);
  cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;
}
.btn-p:hover{background:var(--blue-dark)}
.btn-o{
  background:transparent;color:var(--blue);padding:10px 24px;border-radius:7px;
  font-size:13px;font-weight:600;border:2px solid var(--blue);
  cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;
}
.btn-o:hover{background:var(--blue-pale)}
.hero-stats{
  display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;
  margin-top:2rem;padding-top:1.5rem;
  border-top:1px solid rgba(21,101,192,0.12);
}
.stat .num{font-size:1.75rem;font-weight:700;color:var(--blue);line-height:1}
.stat .lbl{font-size:11px;color:var(--text-light);margin-top:3px;font-weight:500}

.sec{padding:2.5rem 1.5rem;max-width:960px;margin:0 auto}
.sec-bg-navy{background:var(--navy);padding:2.5rem 1.5rem}
.sec-bg-blue{background:var(--blue-pale);padding:2.5rem 1.5rem}
.sec-inner{max-width:960px;margin:0 auto}
.sec-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:5px;font-family:'DM Sans',sans-serif}

.sec-title{font-family:'Tiro Devanagari Marathi',sans-serif;font-size:clamp(1.4rem,2.8vw,1.9rem);color:var(--navy);font-weight:400;margin-bottom:7px;line-height:1.3}
.sec-title-lt{color:white}
.sec-desc{font-size:14px;color:var(--text-mid);line-height:1.75;max-width:560px;font-family:'Tiro Devanagari Marathi',sans-serif}

.divider{width:48px;height:3px;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:2px;margin:7px 0 14px}

.av-p{font-size:12px;opacity:0.65;font-family:'Tiro Devanagari Marathi',sans-serif;line-height:1.5}

.fsub{

  #navbar{padding:0 1rem}
}

function sendMail(){
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const msg=document.getElementById('f-msg').value.trim();
  const l=T[lang];
  if(!name||!msg){alert(lang==='mr'?'कृपया नाव आणि संदेश भरा.':'Please fill your name and message.');return;}
  const subject=encodeURIComponent((lang==='mr'?'संस्थेकडून संदेश: ':'Message from website: ')+name);
  const body=encodeURIComponent((lang==='mr'?'नाव: ':'Name: ')+name+'\n'+(lang==='mr'?'ईमेल: ':'Email: ')+email+'\n\n'+(lang==='mr'?'संदेश:\n':'Message:\n')+msg);
  window.open('mailto:samrajyawelfare@gmail.com?subject='+subject+'&body='+body,'_blank');
  const m=document.getElementById('form-msg');
  m.style.display='block';m.textContent=l.contact.sent;
  setTimeout(()=>{m.style.display='none'},4000);
}

function initScroll(){
  let lastY=window.scrollY;
  window.onscroll=()=>{
    const nav=document.getElementById('navbar');
    if(!nav)return;
    const y=window.scrollY;
    if(y>lastY&&y>80){nav.classList.add('hidden');nav.classList.remove('visible')}
    else{nav.classList.remove('hidden');nav.classList.add('visible')}
    lastY=y;
  };
}
